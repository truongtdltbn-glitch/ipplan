apiVersion: v1
kind: Namespace
metadata:
  name: ipplan
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipplan
  namespace: ipplan
  labels:
    app: ipplan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ipplan
  template:
    metadata:
      labels:
        app: ipplan
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: ipplan
          image: harbor.pgbank.com.vn/library/ipplan:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: DATA_DIR
              value: /app/data
            - name: PORT
              value: "5000"
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ipplan-data
---
apiVersion: v1
kind: Service
metadata:
  name: ipplan
  namespace: ipplan
  labels:
    app: ipplan
spec:
  type: NodePort
  selector:
    app: ipplan
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30050
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ipplan-data
  namespace: ipplan
spec:
  storageClassName: nfs-storage
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Gi
